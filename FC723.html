<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC723</title>

<style>

:root{
--bg1:#0b1220;
--bg2:#111827;
--card:rgba(255,255,255,0.08);
--text:#f8fafc;
--muted:#cbd5e1;
--accent:#7c3aed;

--fail:#ef4444;
--pass:#22c55e;
}

*{box-sizing:border-box}

body{
margin:0;
min-height:100vh;
font-family:Inter,system-ui,Segoe UI,Roboto;
color:var(--text);

background:
radial-gradient(circle at top left,rgba(124,58,237,.35),transparent 30%),
radial-gradient(circle at top right,rgba(6,182,212,.25),transparent 30%),
linear-gradient(135deg,var(--bg1),var(--bg2));

display:flex;
align-items:center;
justify-content:center;
padding:24px;
}

.card{
width:100%;
max-width:760px;
background:var(--card);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(18px);
border-radius:24px;
padding:32px;
box-shadow:0 24px 70px rgba(0,0,0,.35);
}

.header{
text-align:center;
margin-bottom:28px;
}

.badge{
display:inline-block;
padding:8px 14px;
border-radius:999px;
background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.08);
color:var(--muted);
font-size:.9rem;
margin-bottom:14px;
}

h1{
margin:0;
font-size:clamp(2rem,4vw,3rem);
font-weight:800;
}

.subtitle{
margin-top:10px;
color:var(--muted);
}

.grid{
display:grid;
gap:16px;
}

.row{
display:grid;
grid-template-columns:1.4fr 1fr;
gap:14px;
align-items:center;
padding:16px;
border-radius:18px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
}

.label-wrap{
display:flex;
flex-direction:column;
gap:6px;
}

.label{
font-weight:700;
}

.weight{
color:var(--muted);
font-size:.9rem;
}

input{
width:100%;
padding:16px;
border-radius:16px;
border:1px solid rgba(255,255,255,.1);
background:rgba(255,255,255,.05);
color:var(--text);
font-size:1rem;
outline:none;
}

input:focus{
border-color:var(--accent);
box-shadow:0 0 0 4px rgba(124,58,237,.18);
}

.result-card{
margin-top:24px;
padding:24px;
border-radius:22px;
background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(6,182,212,.14));
border:1px solid rgba(255,255,255,.1);
text-align:center;
}

.result{
font-size:3.5rem;
font-weight:900;
margin:0;
}

.status{
margin-top:10px;
font-weight:700;
color:var(--muted);
}

.result-fail .result{color:var(--fail)}
.result-pass .result{color:var(--pass)}

</style>
</head>

<body>

<main class="card">

<div class="header">

<div class="badge">Grade Calculator</div>

<h1>FC723</h1>

<p class="subtitle">
Portfolio Assessments weighted <b>10%, 10%, 15%, 15%, 50%</b>.
Passing grade: <b>65%</b>
</p>

</div>

<div class="grid">

<div class="row">
<div class="label-wrap">
<div class="label">Portfolio Assessment 1</div>
<div class="weight">10%</div>
</div>
<input type="number" id="g1" min="0" max="100">
</div>

<div class="row">
<div class="label-wrap">
<div class="label">Portfolio Assessment 2</div>
<div class="weight">10%</div>
</div>
<input type="number" id="g2" min="0" max="100">
</div>

<div class="row">
<div class="label-wrap">
<div class="label">Portfolio Assessment 3</div>
<div class="weight">15%</div>
</div>
<input type="number" id="g3" min="0" max="100">
</div>

<div class="row">
<div class="label-wrap">
<div class="label">Portfolio Assessment 4</div>
<div class="weight">15%</div>
</div>
<input type="number" id="g4" min="0" max="100">
</div>

<div class="row">
<div class="label-wrap">
<div class="label">FC723 Project</div>
<div class="weight">50%</div>
</div>
<input type="number" id="g5" min="0" max="100">
</div>

</div>

<div class="result-card" id="resultCard">

<h2 class="result" id="result">0%</h2>

<div class="status" id="status">Enter grades</div>

</div>

</main>

<script>

const weights=[10,10,15,15,50]
const inputs=["g1","g2","g3","g4","g5"]

function getGrade(id){
let v=document.getElementById(id).value
if(v==="") return 0
return Math.max(0,Math.min(100,Number(v)))
}

function getStatus(total){

if(total>=65)
return{text:"PASS",className:"result-pass"}

return{text:"FAIL",className:"result-fail"}

}

function calculate(){

let grades=inputs.map(id=>getGrade(id))
let total=0

for(let i=0;i<grades.length;i++)
total+=grades[i]*(weights[i]/100)

document.getElementById("result").textContent=total.toFixed(2)+"%"

let state=getStatus(total)

let card=document.getElementById("resultCard")
let status=document.getElementById("status")

status.textContent=state.text

card.classList.remove("result-pass","result-fail")
card.classList.add(state.className)

}

inputs.forEach(id=>{
document.getElementById(id).addEventListener("input",calculate)
})

</script>

</body>
</html>
